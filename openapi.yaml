openapi: 3.0.3
info:
  title: Notes Backend API
  version: 1.0.0
servers:
  - url: http://localhost:8080

paths:
  /saveNote:
    post:
      summary: Create a new note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteDTO'
      responses:
        '200':
          description: Created note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'

  /getNotes/{userID}:
    get:
      summary: Get notes for user
      parameters:
        - name: userID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Notes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Note'

  /getAllNotes:
    get:
      summary: Get all notes (admin/moderator)
      parameters:
        - name: X-User-ID
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Notes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Note'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /editNote/{noteID}:
    put:
      summary: Edit note by id
      parameters:
        - name: noteID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-User-ID
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteDTO'
      responses:
        '200':
          description: Updated note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found

  /deleteNote/{noteId}:
    delete:
      summary: Delete note by id (admin)
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-User-ID
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found

  /register:
    post:
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationUserDTO'
      responses:
        '200':
          description: Registration result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponceUserDTO'

  /login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginUserDTO'
      responses:
        '200':
          description: Login result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponceUserDTO'
        '401':
          description: Unauthorized

components:
  schemas:
    Note:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        content:
          type: string
        userID:
          type: string
          format: uuid
      required:
        - title
        - content
        - userID

    NoteDTO:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        userID:
          type: string
          format: uuid
      required:
        - title
        - content
        - userID

    RegistrationUserDTO:
      type: object
      properties:
        login:
          type: string
        password:
          type: string
      required:
        - login
        - password

    LoginUserDTO:
      type: object
      properties:
        login:
          type: string
        password:
          type: string
      required:
        - login
        - password

    LoginResponceUserDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
      required:
        - id
        - role

    RegisterResponceUserDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
      required:
        - id
        - role
